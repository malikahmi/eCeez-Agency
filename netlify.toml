[build]
  base = "/"
  command = "npm run build"
  publish = "dist"

# Puppeteer/Chromium for the prerender step. Netlify's build image includes the
# libraries; this tells Puppeteer to download Chromium into a cached location.
# If anything here fails, prerender.mjs skips gracefully and the SPA still deploys.
[build.environment]
  PUPPETEER_CACHE_DIR = "/opt/build/cache/puppeteer"

[context.production.environment]
  VITE_SITE_URL = "https://eceez.com"

[context.deploy-preview.environment]
  VITE_SITE_URL = "https://eceez.com"

[context.branch-deploy.environment]
  VITE_SITE_URL = "https://eceez.com"


# ===== Legacy WordPress URL redirects (must precede SPA catch-all) =====
[[redirects]]
  from = "/build-a-scalable-e-commerce-business/*"
  to = "/blog"
  status = 301
  force = true

[[redirects]]
  from = "/category/*"
  to = "/blog"
  status = 301
  force = true

[[redirects]]
  from = "/author/*"
  to = "/about-us"
  status = 301
  force = true

[[redirects]]
  from = "/wp-content/*"
  to = "/"
  status = 301
  force = true

